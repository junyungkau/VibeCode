<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딸깍 공손 번역기 — 교수님께 보내는 메일</title>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  @font-face{
    font-family:'Moneygraphy-Rounded';
    src:url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Toss/Moneygraphy-Rounded.woff2') format('woff2');
    font-display:swap;
  }
  :root{
    --paper:#eef1f7; --ink:#141a2e; --cobalt:#2f5bff; --bubble:#fff;
    --spark:#ffd44d; --muted:rgba(20,26,46,0.55);
    --display:'Moneygraphy-Rounded','Do Hyeon',sans-serif;
    --body:'Pretendard',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; }
  body{
    background: radial-gradient(ellipse 70% 40% at 50% -5%, rgba(47,91,255,0.10), transparent 65%), var(--paper);
    color:var(--ink); font-family:var(--body); line-height:1.6; min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
  .wrap{ max-width:640px; margin:0 auto; padding:56px 20px 80px; }
  .eyebrow{ font-family:var(--mono); font-size:0.75rem; font-weight:700; letter-spacing:0.14em; color:var(--cobalt); }
  h1{ font-family:var(--display); font-size:clamp(2rem,7vw,2.8rem); margin:10px 0 6px; }
  h1 .hl{ background:linear-gradient(transparent 58%, var(--spark) 58%); padding:0 4px; }
  .sub{ color:var(--muted); font-size:0.95rem; margin-bottom:36px; }

  label{ display:block; font-family:var(--mono); font-size:0.72rem; font-weight:700; letter-spacing:0.12em; color:var(--cobalt); margin:0 0 8px; }
  textarea, select{
    width:100%; background:var(--bubble); border:2.5px solid var(--ink); border-radius:14px;
    font-family:var(--body); font-size:1rem; color:var(--ink); padding:14px 16px;
  }
  textarea{ min-height:110px; resize:vertical; }
  textarea:focus, select:focus{ outline:3px solid rgba(47,91,255,0.35); outline-offset:2px; }
  .field{ margin-bottom:20px; }
  .btn{
    width:100%; background:var(--cobalt); color:#fff; border:2.5px solid var(--ink); border-radius:999px;
    font-family:var(--display); font-size:1.25rem; padding:16px; cursor:pointer;
    box-shadow:5px 6px 0 var(--ink); transition:transform .12s, box-shadow .12s;
  }
  .btn:hover{ transform:translate(-2px,-2px); box-shadow:7px 8px 0 var(--ink); }
  .btn:active{ transform:translate(0,0); box-shadow:3px 4px 0 var(--ink); }
  .btn:disabled{ opacity:.55; cursor:progress; }

  #result{ margin-top:32px; }
  .mail{
    background:var(--bubble); border:2.5px solid var(--ink); border-radius:18px;
    box-shadow:6px 8px 0 var(--ink); padding:26px 26px 22px;
    animation:pop .4s ease;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px);} }
  .mail .k{ font-family:var(--mono); font-size:0.7rem; font-weight:700; letter-spacing:0.12em; color:var(--cobalt); }
  .mail .subject{ font-weight:800; font-size:1.1rem; margin:6px 0 18px; }
  .mail .bodytext{ white-space:pre-wrap; font-size:0.98rem; }
  .copy{
    margin-top:18px; background:var(--paper); border:2px solid var(--ink); border-radius:999px;
    font-family:var(--mono); font-size:0.8rem; font-weight:700; padding:10px 20px; cursor:pointer;
  }
  .error{ background:#fff; border:2.5px solid var(--cobalt); border-radius:14px; padding:16px 18px; font-size:0.9rem; }
  .loading{ font-family:var(--mono); font-size:0.85rem; color:var(--muted); }
  footer{ margin-top:56px; text-align:center; font-family:var(--mono); font-size:0.72rem; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">DDALKKAK UNION · DEMO 01</div>
  <h1>딸깍 <span class="hl">공손 번역기</span></h1>
  <p class="sub">하고 싶은 말을 막 적으면, 교수님께 보내도 되는 메일로 딸깍 변환해드립니다.</p>

  <div class="field">
    <label for="raw">하고 싶은 말 (솔직하게)</label>
    <textarea id="raw" maxlength="500" placeholder="예: 저번주 과제 늦게 낸거 점수 좀 봐주시면 안되나요 진짜 아파서 못했어요"></textarea>
  </div>
  <div class="field">
    <label for="situation">상황</label>
    <select id="situation">
      <option>과제 기한 연장/지각 제출 부탁</option>
      <option>성적 문의</option>
      <option>수업 결석 사유 전달</option>
      <option>추천서/면담 요청</option>
      <option>기타 (내용으로 판단)</option>
    </select>
  </div>
  <button class="btn" id="go">공손하게 딸깍</button>

  <div id="result"></div>

  <footer>Powered by NVIDIA NIM (free API) · 프롬프트만 바꾸면 뭐든 됩니다</footer>
</div>

<script>
const go = document.getElementById('go');
const resultEl = document.getElementById('result');

go.addEventListener('click', async () => {
  const raw = document.getElementById('raw').value.trim();
  const situation = document.getElementById('situation').value;
  if(!raw){ resultEl.innerHTML = '<div class="error">먼저 하고 싶은 말을 적어주세요!</div>'; return; }

  go.disabled = true; go.textContent = '변환 중...';
  resultEl.innerHTML = '<p class="loading">문장을 공손하게 다림질하는 중...</p>';

  try{
    const res = await fetch('/api/polish', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ raw, situation })
    });
    if(!res.ok) throw new Error('서버 응답 오류 ('+res.status+')');
    const data = await res.json();

    resultEl.innerHTML = `
      <div class="mail">
        <div class="k">SUBJECT</div>
        <div class="subject">${esc(data.subject)}</div>
        <div class="k">BODY</div>
        <div class="bodytext">${esc(data.body)}</div>
        <button class="copy" id="copyBtn">메일 전체 복사</button>
      </div>`;
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText('제목: '+data.subject+'\n\n'+data.body);
      document.getElementById('copyBtn').textContent = '복사 완료!';
    });
  }catch(err){
    resultEl.innerHTML = '<div class="error">변환에 실패했어요. 잠시 후 다시 시도해주세요.<br><small>'+esc(err.message)+'</small></div>';
  }finally{
    go.disabled = false; go.textContent = '공손하게 딸깍';
  }
});

function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
</script>
</body>
</html>
